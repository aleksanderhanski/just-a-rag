services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    container_name: rag-app
    ports:
      - "7860:7860"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATA_DIR=/app/data
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./data:/app/data 
    restart: unless-stopped

volumes:
  hf_cache: